<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Category Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/analysis/dashboard">Spend Analytics</a>
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/analysis/suppliers">Suppliers</a></li>
            <li class="nav-item"><a class="nav-link active" href="/analysis/categories">Categories</a></li>
            <li class="nav-item"><a class="nav-link" href="/analysis/trends">Trends</a></li>
        </ul>
    </div>
</nav>
<main class="container my-4">
    <div class="card shadow-sm">
        <div class="card-header">Spend by Category</div>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead><tr><th>Category</th><th class="text-end">Spend</th></tr></thead>
                <tbody>
                <tr th:each="entry : ${#maps.entries(analytics.spendByCategory)}">
                    <td th:text="${entry.key}">Category</td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(entry.value, 0, 'COMMA', 2, 'POINT')}">0.00</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
