<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spend Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        .card-kpi { border-left: 4px solid #0d6efd; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.0"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Spend Analytics</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" href="/analysis/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/savings">Savings</a></li>
                <li class="nav-item"><a class="nav-link" href="/report">Reports</a></li>
            </ul>
        </div>
    </div>
    
    
</nav>

<main class="container my-4">
    <div class="row g-3">
        <div class="col-md-3">
            <div class="card card-kpi shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">Total Spend</h6>
                    <h3 th:text="${#numbers.formatDecimal(analytics.totalSpend, 0, 'COMMA', 2, 'POINT')}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-kpi shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted">Transactions</h6>
                    <h3 th:text="${analytics.transactionCount}">0</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">Spend by Supplier</div>
                <div class="card-body">
                    <canvas id="supplierChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header">Spend by Category</div>
                <div class="card-body">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header">Monthly Trend</div>
                <div class="card-body">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
/*<![CDATA[*/
const supplierData = /*[[${analytics.spendBySupplier}]]*/ {};
const categoryData = /*[[${analytics.spendByCategory}]]*/ {};
const trendData = /*[[${analytics.monthlyTrend}]]*/ {};

function toLabelsAndValues(mapObj) {
    const labels = Object.keys(mapObj || {});
    const values = labels.map(k => Number(mapObj[k]));
    return { labels, values };
}

const supplier = toLabelsAndValues(supplierData);
new Chart(document.getElementById('supplierChart'), {
    type: 'bar',
    data: { labels: supplier.labels, datasets: [{ label: 'Spend', data: supplier.values, backgroundColor: '#0d6efd' }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
});

const category = toLabelsAndValues(categoryData);
new Chart(document.getElementById('categoryChart'), {
    type: 'bar',
    data: { labels: category.labels, datasets: [{ label: 'Spend', data: category.values, backgroundColor: '#198754' }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
});

const trend = toLabelsAndValues(trendData);
new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels: trend.labels, datasets: [{ label: 'Spend', data: trend.values, borderColor: '#6f42c1' }] },
    options: { responsive: true, scales: { x: { ticks: { autoSkip: true, maxTicksLimit: 12 } } } }
});
/*]]>*/
</script>

</body>
</html>
