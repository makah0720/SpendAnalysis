<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Savings Tracking</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/analysis/dashboard">Spend Analytics</a>
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link active" href="/savings">Savings</a></li>
            <li class="nav-item"><a class="nav-link" href="/report">Reports</a></li>
        </ul>
    </div>
</nav>
<main class="container my-4">
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>Initiatives</span>
            <form class="d-flex" method="post">
                <input class="form-control form-control-sm me-2" name="initiativeName" placeholder="Initiative" required>
                <input class="form-control form-control-sm me-2" name="categoryCode" placeholder="Category">
                <input class="form-control form-control-sm me-2" name="supplierName" placeholder="Supplier">
                <input class="form-control form-control-sm me-2" name="baselineSpend" placeholder="Baseline" type="number" step="0.01" required>
                <input class="form-control form-control-sm me-2" name="realizedSpend" placeholder="Realized" type="number" step="0.01" required>
                <input class="form-control form-control-sm me-2" name="period" placeholder="Period (YYYY-MM-01)" type="date" required>
                <button class="btn btn-sm btn-primary" type="submit">Add</button>
            </form>
        </div>
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead>
                <tr>
                    <th>Initiative</th>
                    <th>Category</th>
                    <th>Supplier</th>
                    <th>Baseline</th>
                    <th>Realized</th>
                    <th>Savings</th>
                    <th>Period</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${savings}">
                    <td th:text="${s.initiativeName}">-</td>
                    <td th:text="${s.categoryCode}">-</td>
                    <td th:text="${s.supplierName}">-</td>
                    <td th:text="${#numbers.formatDecimal(s.baselineSpend, 0, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${#numbers.formatDecimal(s.realizedSpend, 0, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${#numbers.formatDecimal(s.savings, 0, 'COMMA', 2, 'POINT')}">0</td>
                    <td th:text="${s.period}">-</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
