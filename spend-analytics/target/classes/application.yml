spring:
  datasource:
    url: jdbc:h2:mem:spenddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080

app:
  security:
    admin-user: admin
    admin-pass: admin123
    analyst-user: analyst
    analyst-pass: analyst123

